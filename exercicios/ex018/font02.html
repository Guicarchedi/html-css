<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: "Halloween";
            src: url("Fontes/HALLOWEEN.ttf") format('truetype');
            font-weight: normal;
            font-style: normal;
            /*
                tipos de formatos:
                - Opentype (otf)
                - Truetype (ttf)
                - embedded-opentype
                - truetype-aat (Apple Adivanced Typography)
                - svg
            */

        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family: 'Halloween', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Totam praesentium, pariatur, id non, recusandae rem quasi blanditiis quis nemo ab iure? Unde aperiam nesciunt optio corrupti molestiae beatae! Assumenda, eos.</p>
</body>
</html>
