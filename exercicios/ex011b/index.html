<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>reproduzindo audios</title>
</head>
<body>
    <h1>Reprodução de audios</h1>
    <p>Vamos aprender a reproduir audios em html5</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.ogg" type="audio/ogg">
        <source src="midia/guanacast-33.wav" type="audio/wav">
        <p>infelizmente seu navegador não consegue reproduir audio clique aqui para baixar o <a href="midia/guanacast-33.mp3">arquivo MP3</a></p>
    </audio>
</body>
</html>
